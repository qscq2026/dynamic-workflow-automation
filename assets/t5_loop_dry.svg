<svg width="100%" viewBox="0 0 680 220" role="img" xmlns="http://www.w3.org/2000/svg">
<style>
  .c-gray rect{fill:#f1efe8;stroke:#5f5e5a}
  .c-purple rect{fill:#eeedfe;stroke:#534ab7}
  .c-teal rect{fill:#e1f5ee;stroke:#0f6e56}
  .c-amber rect{fill:#faeeda;stroke:#854f0b}
  .th{fill:#444441;font-size:14px;font-weight:500}
  .ts{fill:#5f5e5a;font-size:12px;font-weight:400}
  .c-purple .th{fill:#3c3489}
  .c-amber .th{fill:#633806}
  .c-teal .th{fill:#085041}
  text{font-family:"Anthropic Sans",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
  line{fill:none;stroke:#73726c;stroke-width:1.5}
</style>
<title>T5 循环发现</title>
<desc>持续搜索直到连续N轮无新发现，内置budget guard防止超限</desc>
<defs><marker id="a4" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<g class="c-gray"><rect x="20" y="88" width="90" height="44" rx="8" stroke-width="0.5"/><text class="th" x="65" y="105" text-anchor="middle" dominant-baseline="central">开始</text><text class="ts" x="65" y="122" text-anchor="middle" dominant-baseline="central">all = Set()</text></g>
<line x1="110" y1="110" x2="158" y2="110" stroke-width="0.5" marker-end="url(#a4)"/>
<g class="c-purple"><rect x="160" y="88" width="130" height="44" rx="8" stroke-width="0.5"/><text class="th" x="225" y="105" text-anchor="middle" dominant-baseline="central">搜索 agent</text><text class="ts" x="225" y="122" text-anchor="middle" dominant-baseline="central">已有 N 个，找新的</text></g>
<line x1="290" y1="110" x2="338" y2="110" stroke-width="0.5" marker-end="url(#a4)"/>
<g class="c-amber"><rect x="340" y="88" width="130" height="44" rx="8" stroke-width="0.5"/><text class="th" x="405" y="105" text-anchor="middle" dominant-baseline="central">有新发现？</text><text class="ts" x="405" y="122" text-anchor="middle" dominant-baseline="central">key 去重判断</text></g>
<line x1="405" y1="132" x2="405" y2="168" stroke-width="0.5" marker-end="url(#a4)"/>
<text class="ts" x="422" y="155" text-anchor="start">否 → dryRuns++</text>
<g class="c-teal"><rect x="340" y="170" width="130" height="36" rx="8" stroke-width="0.5"/><text class="th" x="405" y="188" text-anchor="middle" dominant-baseline="central">dryRuns ≥ 2?</text></g>
<path d="M340 188 L225 188 L225 132" fill="none" stroke="#73726c" stroke-width="0.5" stroke-dasharray="3 2" marker-end="url(#a4)"/>
<text class="ts" x="270" y="185" text-anchor="middle">否 → 继续</text>
<line x1="470" y1="188" x2="538" y2="188" stroke-width="0.5" marker-end="url(#a4)"/>
<text class="ts" x="490" y="180" text-anchor="start">是</text>
<g class="c-gray"><rect x="540" y="170" width="110" height="36" rx="8" stroke-width="0.5"/><text class="th" x="595" y="188" text-anchor="middle" dominant-baseline="central">返回结果</text></g>
<rect x="148" y="20" width="340" height="188" rx="10" fill="none" stroke="#b8b7af" stroke-width="0.5" stroke-dasharray="4 2"/>
<text class="ts" x="318" y="14" text-anchor="middle">while (dryRuns &lt; 2 &amp;&amp; budget.remaining() &gt; 50k)</text>
</svg>