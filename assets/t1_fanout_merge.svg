<svg width="100%" viewBox="0 0 680 220" role="img" xmlns="http://www.w3.org/2000/svg">
<style>
  .c-gray rect{fill:#f1efe8;stroke:#5f5e5a}
  .c-purple rect{fill:#eeedfe;stroke:#534ab7}
  .c-teal rect{fill:#e1f5ee;stroke:#0f6e56}
  .th{fill:#444441;font-size:14px;font-weight:500}
  .ts{fill:#5f5e5a;font-size:12px;font-weight:400}
  text{font-family:"Anthropic Sans",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
  line{fill:none;stroke:#73726c;stroke-width:1.5}
</style>
<title>T1 Fan-Out + 汇聚</title>
<desc>任务拆分为N个并行子任务，全部完成后汇聚成一份综合报告</desc>
<defs><marker id="a0" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<g class="c-gray"><rect x="20" y="88" width="100" height="44" rx="8" stroke-width="0.5"/><text class="th" x="70" y="110" text-anchor="middle" dominant-baseline="central">任务输入</text></g>
<line x1="120" y1="110" x2="148" y2="60" stroke-width="0.5" marker-end="url(#a0)"/>
<line x1="120" y1="110" x2="148" y2="110" stroke-width="0.5" marker-end="url(#a0)"/>
<line x1="120" y1="110" x2="148" y2="160" stroke-width="0.5" marker-end="url(#a0)"/>
<g class="c-purple"><rect x="150" y="38" width="110" height="44" rx="8" stroke-width="0.5"/><text class="th" x="205" y="55" text-anchor="middle" dominant-baseline="central">agent 1</text><text class="ts" x="205" y="72" text-anchor="middle" dominant-baseline="central">处理单元 A</text></g>
<g class="c-purple"><rect x="150" y="88" width="110" height="44" rx="8" stroke-width="0.5"/><text class="th" x="205" y="105" text-anchor="middle" dominant-baseline="central">agent 2</text><text class="ts" x="205" y="122" text-anchor="middle" dominant-baseline="central">处理单元 B</text></g>
<g class="c-purple"><rect x="150" y="138" width="110" height="44" rx="8" stroke-width="0.5"/><text class="th" x="205" y="155" text-anchor="middle" dominant-baseline="central">agent 3</text><text class="ts" x="205" y="172" text-anchor="middle" dominant-baseline="central">处理单元 C</text></g>
<text class="ts" x="290" y="60" text-anchor="middle" dominant-baseline="central">parallel()</text>
<line x1="260" y1="60" x2="348" y2="105" stroke-width="0.5" marker-end="url(#a0)"/>
<line x1="260" y1="110" x2="348" y2="110" stroke-width="0.5" marker-end="url(#a0)"/>
<line x1="260" y1="160" x2="348" y2="115" stroke-width="0.5" marker-end="url(#a0)"/>
<g class="c-teal"><rect x="350" y="88" width="120" height="44" rx="8" stroke-width="0.5"/><text class="th" x="410" y="105" text-anchor="middle" dominant-baseline="central">汇聚 agent</text><text class="ts" x="410" y="122" text-anchor="middle" dominant-baseline="central">综合所有结果</text></g>
<line x1="470" y1="110" x2="538" y2="110" stroke-width="0.5" marker-end="url(#a0)"/>
<g class="c-gray"><rect x="540" y="88" width="120" height="44" rx="8" stroke-width="0.5"/><text class="th" x="600" y="105" text-anchor="middle" dominant-baseline="central">综合报告</text><text class="ts" x="600" y="122" text-anchor="middle" dominant-baseline="central">统一输出</text></g>
<text class="ts" x="340" y="200" text-anchor="middle">适用：文件批量分析、多源数据提取、并行搜索后汇总</text>
</svg>