<svg width="100%" viewBox="0 0 680 210" role="img" xmlns="http://www.w3.org/2000/svg">
<style>
  .c-gray rect{fill:#f1efe8;stroke:#5f5e5a}
  .c-coral rect{fill:#faece7;stroke:#993c1d}
  .c-amber rect{fill:#faeeda;stroke:#854f0b}
  .th{fill:#444441;font-size:14px;font-weight:500}
  .ts{fill:#5f5e5a;font-size:12px;font-weight:400}
  .c-coral .th{fill:#712b13}
  .c-coral .ts{fill:#993c1d}
  .c-amber .th{fill:#633806}
  text{font-family:"Anthropic Sans",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
  line{fill:none;stroke:#73726c;stroke-width:1.5}
</style>
<title>T6 对抗验证</title>
<desc>多个独立验证者尝试反驳同一结论，schema投票决定通过与否</desc>
<defs><marker id="a5" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<g class="c-gray"><rect x="20" y="88" width="110" height="44" rx="8" stroke-width="0.5"/><text class="th" x="75" y="105" text-anchor="middle" dominant-baseline="central">发现 agent</text><text class="ts" x="75" y="122" text-anchor="middle" dominant-baseline="central">生成结论</text></g>
<line x1="130" y1="110" x2="168" y2="60" stroke-width="0.5" marker-end="url(#a5)"/>
<line x1="130" y1="110" x2="168" y2="110" stroke-width="0.5" marker-end="url(#a5)"/>
<line x1="130" y1="110" x2="168" y2="160" stroke-width="0.5" marker-end="url(#a5)"/>
<g class="c-coral"><rect x="170" y="38" width="130" height="44" rx="8" stroke-width="0.5"/><text class="th" x="235" y="55" text-anchor="middle" dominant-baseline="central">验证者 1</text><text class="ts" x="235" y="72" text-anchor="middle" dominant-baseline="central">尝试反驳</text></g>
<g class="c-coral"><rect x="170" y="88" width="130" height="44" rx="8" stroke-width="0.5"/><text class="th" x="235" y="105" text-anchor="middle" dominant-baseline="central">验证者 2</text><text class="ts" x="235" y="122" text-anchor="middle" dominant-baseline="central">尝试反驳</text></g>
<g class="c-coral"><rect x="170" y="138" width="130" height="44" rx="8" stroke-width="0.5"/><text class="th" x="235" y="155" text-anchor="middle" dominant-baseline="central">验证者 3</text><text class="ts" x="235" y="172" text-anchor="middle" dominant-baseline="central">尝试反驳</text></g>
<text class="ts" x="200" y="26" text-anchor="middle">schema → { verdict, reason }</text>
<line x1="300" y1="60" x2="368" y2="105" stroke-width="0.5" marker-end="url(#a5)"/>
<line x1="300" y1="110" x2="368" y2="110" stroke-width="0.5" marker-end="url(#a5)"/>
<line x1="300" y1="160" x2="368" y2="115" stroke-width="0.5" marker-end="url(#a5)"/>
<g class="c-amber"><rect x="370" y="88" width="130" height="44" rx="8" stroke-width="0.5"/><text class="th" x="435" y="105" text-anchor="middle" dominant-baseline="central">投票计数</text><text class="ts" x="435" y="122" text-anchor="middle" dominant-baseline="central">pass ≥ 2 → 通过</text></g>
<line x1="500" y1="110" x2="558" y2="110" stroke-width="0.5" marker-end="url(#a5)"/>
<g class="c-gray"><rect x="560" y="88" width="100" height="44" rx="8" stroke-width="0.5"/><text class="th" x="610" y="105" text-anchor="middle" dominant-baseline="central">verdict</text><text class="ts" x="610" y="122" text-anchor="middle" dominant-baseline="central">通过 / 驳回</text></g>
<text class="ts" x="340" y="198" text-anchor="middle">适用：结论可信度验证、事实核查、方案风险评估</text>
</svg>