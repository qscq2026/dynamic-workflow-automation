<svg width="100%" viewBox="0 0 680 200" role="img" xmlns="http://www.w3.org/2000/svg">
<style>
  .c-gray rect{fill:#f1efe8;stroke:#5f5e5a}
  .c-purple rect{fill:#eeedfe;stroke:#534ab7}
  .c-teal rect{fill:#e1f5ee;stroke:#0f6e56}
  .th{fill:#444441;font-size:14px;font-weight:500}
  .ts{fill:#5f5e5a;font-size:12px;font-weight:400}
  text{font-family:"Anthropic Sans",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
  line{fill:none;stroke:#73726c;stroke-width:1.5;stroke-linecap:butt;stroke-linejoin:miter}
</style>
<title>T3 Pipeline 无屏障</title>
<desc>每个单元依次经过多个阶段，无需等待其他单元完成即可进入下一阶段</desc>
<defs><marker id="a2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<text class="ts" x="60" y="36" text-anchor="middle">单元 1</text>
<text class="ts" x="60" y="96" text-anchor="middle">单元 2</text>
<text class="ts" x="60" y="156" text-anchor="middle">单元 3</text>
<g class="c-purple"><rect x="20" y="44" width="80" height="36" rx="6" stroke-width="0.5"/><text class="ts" x="60" y="62" text-anchor="middle" dominant-baseline="central">阶段 1</text></g>
<g class="c-purple"><rect x="20" y="104" width="80" height="36" rx="6" stroke-width="0.5"/><text class="ts" x="60" y="122" text-anchor="middle" dominant-baseline="central">阶段 1</text></g>
<g class="c-purple"><rect x="20" y="164" width="80" height="36" rx="6" stroke-width="0.5"/><text class="ts" x="60" y="182" text-anchor="middle" dominant-baseline="central">阶段 1</text></g>
<line x1="100" y1="62" x2="158" y2="62" stroke-width="0.5" marker-end="url(#a2)"/>
<line x1="100" y1="122" x2="158" y2="122" stroke-width="0.5" marker-end="url(#a2)"/>
<line x1="100" y1="182" x2="158" y2="182" stroke-width="0.5" marker-end="url(#a2)"/>
<g class="c-teal"><rect x="160" y="44" width="80" height="36" rx="6" stroke-width="0.5"/><text class="ts" x="200" y="62" text-anchor="middle" dominant-baseline="central">阶段 2</text></g>
<g class="c-teal"><rect x="160" y="104" width="80" height="36" rx="6" stroke-width="0.5"/><text class="ts" x="200" y="122" text-anchor="middle" dominant-baseline="central">阶段 2</text></g>
<g class="c-teal"><rect x="160" y="164" width="80" height="36" rx="6" stroke-width="0.5"/><text class="ts" x="200" y="182" text-anchor="middle" dominant-baseline="central">阶段 2</text></g>
<line x1="240" y1="62" x2="298" y2="62" stroke-width="0.5" marker-end="url(#a2)"/>
<line x1="240" y1="122" x2="298" y2="122" stroke-width="0.5" marker-end="url(#a2)"/>
<line x1="240" y1="182" x2="298" y2="182" stroke-width="0.5" marker-end="url(#a2)"/>
<g class="c-gray"><rect x="300" y="44" width="80" height="36" rx="6" stroke-width="0.5"/><text class="ts" x="340" y="62" text-anchor="middle" dominant-baseline="central">阶段 3</text></g>
<g class="c-gray"><rect x="300" y="104" width="80" height="36" rx="6" stroke-width="0.5"/><text class="ts" x="340" y="122" text-anchor="middle" dominant-baseline="central">阶段 3</text></g>
<g class="c-gray"><rect x="300" y="164" width="80" height="36" rx="6" stroke-width="0.5"/><text class="ts" x="340" y="182" text-anchor="middle" dominant-baseline="central">阶段 3</text></g>
<text class="ts" x="470" y="62" text-anchor="start">单元 1 已进入阶段 3</text>
<text class="ts" x="470" y="82" text-anchor="start">单元 2 仍在阶段 2</text>
<text class="ts" x="470" y="102" text-anchor="start">单元 3 刚完成阶段 1</text>
<text class="ts" x="470" y="122" text-anchor="start">— 无需互相等待</text>
<rect x="458" y="48" width="200" height="84" rx="6" fill="none" stroke="#b8b7af" stroke-width="0.5" stroke-dasharray="3 2"/>
<text class="ts" x="340" y="14" text-anchor="middle">pipeline() — 各单元独立流动</text>
</svg>